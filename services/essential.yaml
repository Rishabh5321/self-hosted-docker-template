services:
    essential:
        image: alpine:latest
        container_name: essential_dummy
        command: ["true"]
        restart: "no"
        labels:
            - "glance.parent=suwayomi"
            - "glance.name=essential"
            - "glance.hide=true"
        depends_on:
            - jellyfin
            - radarr
            - sonarr
            - prowlarr
            - qbittorrent
            - authentik-postgresql
            - cloudflared
            - traefik
            - server
            - worker
